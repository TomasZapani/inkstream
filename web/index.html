<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inkstream</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: sans-serif;
        }

        #canvas {
            display: block;
            cursor: crosshair;
        }

        #cursors {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
        }

        #toolbar {
            position: absolute;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 10px 18px;
        }

        #toolbar label {
            color: #ccc;
            font-size: 13px;
        }

        #colorPicker {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            padding: 0;
            background: none;
        }

        #brushSize {
            width: 80px;
            accent-color: #7c6af7;
        }

        #clearBtn {
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
        }

        #clearBtn:hover { background: #c0392b; }

        #userCount {
            color: #aaa;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <canvas id="cursors"></canvas>

    <div id="toolbar">
        <label>Color</label>
        <input type="color" id="colorPicker" value="#ffffff">
        <label>Grosor</label>
        <input type="range" id="brushSize" min="1" max="30" value="4">
        <button id="clearBtn">Limpiar</button>
        <span id="userCount"></span>
    </div>

    <script src="app.js"></script>
</body>
</html>
